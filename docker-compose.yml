services:
  neo4j:
    image: neo4j:5.26.0-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" \"RETURN 1;\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./infra/neo4j/data:/data
      - ./infra/neo4j/logs:/logs
      - ./infra/neo4j/plugins:/plugins
